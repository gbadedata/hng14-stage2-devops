name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python linters
        run: pip install flake8

      - name: Lint API
        run: flake8 api/main.py --max-line-length=120 --ignore=E302,W503

      - name: Lint Worker
        run: flake8 worker/worker.py --max-line-length=120 --ignore=E302,W503

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: cd frontend && npm install

      - name: Lint frontend
        run: cd frontend && npx eslint app.js --no-eslintrc -c .eslintrc.json

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          failure-threshold: error

      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile
          failure-threshold: error

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: error

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Run tests with coverage
        run: |
          cd api
          python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/jobpilot-api:${{ github.sha }}
            localhost:5000/jobpilot-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/jobpilot-worker:${{ github.sha }}
            localhost:5000/jobpilot-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/jobpilot-frontend:${{ github.sha }}
            localhost:5000/jobpilot-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Rebuild images for scanning
        run: |
          docker build -t localhost:5000/jobpilot-api:${{ github.sha }} ./api
          docker build -t localhost:5000/jobpilot-worker:${{ github.sha }} ./worker
          docker build -t localhost:5000/jobpilot-frontend:${{ github.sha }} ./frontend
          docker push localhost:5000/jobpilot-api:${{ github.sha }}
          docker push localhost:5000/jobpilot-worker:${{ github.sha }}
          docker push localhost:5000/jobpilot-frontend:${{ github.sha }}


      - name: Show vulnerabilities
        run: |
          docker run --rm aquasec/trivy:latest image \
            --severity CRITICAL \
            --no-progress \
            localhost:5000/jobpilot-api:${{ github.sha }} || true
                
      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/jobpilot-api:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: "0"

      - name: Scan Worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/jobpilot-worker:${{ github.sha }}
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: "0"

      - name: Scan Frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/jobpilot-frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: "0"

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-results
          path: trivy-*.sarif

  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cp .env.example .env
          echo "FRONTEND_PORT=3000" >> .env

      - name: Build and start full stack
        run: |
          docker compose up -d --build
          echo "Waiting for all services to be healthy..."
          sleep 30

      - name: Check all containers are running
        run: docker compose ps

      - name: Submit job and poll for completion
        run: |
          echo "Submitting job..."
          RESPONSE=$(curl -sf -X POST http://localhost:3000/submit \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Response: $RESPONSE"

          JOB_ID=$(echo $RESPONSE | python3 -c "import json,sys; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"

          echo "Polling for completion..."
          for i in $(seq 1 15); do
            STATUS_RESPONSE=$(curl -sf http://localhost:3000/status/$JOB_ID)
            echo "Poll $i: $STATUS_RESPONSE"
            STATUS=$(echo $STATUS_RESPONSE | python3 -c "import json,sys; print(json.load(sys.stdin)['status'])")
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully!"
              exit 0
            fi
            sleep 5
          done

          echo "Job did not complete within timeout"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via rolling update
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            ${DEPLOY_USER}@${DEPLOY_HOST} << 'ENDSSH'
            set -e
            cd /opt/jobpilot

            echo "Pulling latest code..."
            git pull origin main

            echo "Rolling update..."
            for SVC in api worker frontend; do
              echo "Updating $SVC..."
              docker compose build $SVC

              docker compose up -d --no-deps $SVC

              echo "Waiting for $SVC to be healthy..."
              HEALTHY=false
              for i in $(seq 1 12); do
                HEALTH=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q $SVC) 2>/dev/null || echo "none")
                echo "$SVC health: $HEALTH"
                if [ "$HEALTH" = "healthy" ]; then
                  HEALTHY=true
                  break
                fi
                sleep 5
              done

              if [ "$HEALTHY" = "false" ]; then
                echo "ERROR: $SVC failed health check. Aborting deploy."
                exit 1
              fi

              echo "$SVC updated successfully."
            done

            echo "Deploy complete."
          ENDSSH
